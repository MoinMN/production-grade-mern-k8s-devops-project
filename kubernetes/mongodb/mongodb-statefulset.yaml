apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: portfolio

spec:
  clusterIP: None

  selector:
    app: mongodb

  ports:
  - port: 27017

---
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb
  namespace: portfolio

spec:
  serviceName: mongodb

  replicas: 2

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:

      nodeSelector:
        node-type: db

      containers:
      - name: mongodb
        image: mongo:6

        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--bind_ip_all"

        ports:
        - containerPort: 27017

        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db

  volumeClaimTemplates:
  - metadata:
      name: mongodb-storage

    spec:
      accessModes:
        - ReadWriteOnce

      storageClassName: manual

      resources:
        requests:
          storage: 5Gi
