apiVersion: v1
kind: ServiceAccount
metadata:
  name: metricbeat
  namespace: observability

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metricbeat

rules:
- apiGroups: [""]
  resources:
    - nodes
    - nodes/stats
    - nodes/proxy
    - nodes/metrics
    - pods
    - namespaces
    - services
    - events
  verbs:
    - get
    - list
    - watch

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metricbeat

subjects:
- kind: ServiceAccount
  name: metricbeat
  namespace: observability

roleRef:
  kind: ClusterRole
  name: metricbeat
  apiGroup: rbac.authorization.k8s.io
