apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: observability

spec:
  selector:
    matchLabels:
      app: filebeat

  template:
    metadata:
      labels:
        app: filebeat

    spec:
      serviceAccountName: filebeat

      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.19.16

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        volumeMounts:
        - name: config
          mountPath: /usr/share/filebeat/filebeat.yml
          readOnly: true
          subPath: filebeat.yml

        - name: varlogcontainers
          mountPath: /var/log/containers

        - name: varlogpods
          mountPath: /var/log/pods

      volumes:
      - name: config
        configMap:
          defaultMode: 0600
          name: filebeat-config

      - name: varlogcontainers
        hostPath:
          path: /var/log/containers

      - name: varlogpods
        hostPath:
          path: /var/log/pods
