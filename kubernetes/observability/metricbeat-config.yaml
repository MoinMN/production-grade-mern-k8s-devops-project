apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-config
  namespace: observability

data:
  metricbeat.yml: |
    metricbeat.modules:

    - module: system
      period: 10s
      metricsets:
        - cpu
        - memory
        - network
        - process
        - filesystem
        - fsstat
      processes: ['.*']

    - module: kubernetes
      metricsets:
        - node
        - pod
        - container
        - system
        - volume

      period: 10s

      host: ${NODE_NAME}

      hosts:
        - https://${NODE_IP}:10250

      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      ssl.verification_mode: none

    output.elasticsearch:
      hosts: ["https://10.0.2.160:9200"]
      username: "elastic"
      password: "Gg_d05dlbL5LfNNv7suH"
      ssl.verification_mode: none
