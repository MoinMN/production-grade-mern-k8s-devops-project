apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: portfolio

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      nodeSelector:
        node-type: app

      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: backend
          image: 918792379419.dkr.ecr.ap-south-1.amazonaws.com/portfolio-backend:1
          imagePullPolicy: Always

          ports:
            - containerPort: 4518

          envFrom:
            - secretRef:
                name: backend-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 4518
            initialDelaySeconds: 15
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 4518
            initialDelaySeconds: 30
            periodSeconds: 10

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
