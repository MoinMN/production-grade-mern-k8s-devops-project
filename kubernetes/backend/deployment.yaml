apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        node-type: app
      containers:
        - name: backend
          image: moinnaik/portfolio-backend:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4518
          envFrom:
            - secretRef:
                name: backend-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 4518
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 4518
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
